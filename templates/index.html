<!DOCTYPE html>
<html>

<head>

<title>Language Translator</title>

<style>

body{

margin:0;

font-family:Arial;

background:
linear-gradient(
135deg,
#6dd5fa,
#ffffff,
#ffdde1
);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

width:550px;

background:white;

padding:35px;

border-radius:25px;

box-shadow:
0 20px 50px rgba(0,0,0,.2);

}

h1{

text-align:center;

color:#5b21b6;

}

textarea,
select,
button{

width:100%;

padding:15px;

margin-top:15px;

border-radius:12px;

font-size:16px;

}

textarea{

height:120px;

}

button{

background:
linear-gradient(
90deg,
#2563eb,
#ec4899
);

color:white;

border:none;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>
🌍 Language Translator
</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter text"
required>
</textarea>

<select name="source">

<option value="english">
English
</option>

<option value="telugu">
Telugu
</option>

<option value="hindi">
Hindi
</option>

</select>

<select name="target">

<option value="telugu">
Telugu
</option>

<option value="english">
English
</option>

<option value="hindi">
Hindi
</option>

</select>

<button type="submit">

Translate

</button>

</form>

<textarea readonly>

{{ translated }}

</textarea>

</div>

</body>
