<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Language Translation Tool</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#2563eb);
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.card{

width:500px;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,.3);

}

h1{
text-align:center;
color:#2563eb;
}

textarea,select{

width:100%;

padding:12px;

margin-top:12px;

border-radius:10px;

border:1px solid #ccc;

}

button{

width:100%;

padding:14px;

margin-top:15px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}

.result{

margin-top:20px;

padding:15px;

background:#eef4ff;

border-radius:10px;

font-size:18px;

}

</style>

</head>

<body>

<div class="card">

<h1>🌍 Language Translation Tool</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter text"
required></textarea>

<select name="source">

<option value="en">English</option>
<option value="te">Telugu</option>

</select>

<select name="target">

<option value="te">Telugu</option>
<option value="en">English</option>

</select>

<button type="submit">

Translate

</button>

</form>

{% if translated %}

<div class="result">

<b>Output:</b><br>

{{ translated }}

</div>

{% endif %}

</div>

</body>

</html>
