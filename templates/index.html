<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Language Translation Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

background:
linear-gradient(
135deg,
#4facfe,
#00f2fe,
#667eea
);

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:100%;

height:100%;

background:

url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3")
center/cover;

opacity:.18;

}

.container{

position:relative;

width:520px;

padding:35px;

background:
rgba(255,255,255,.18);

backdrop-filter:
blur(18px);

border-radius:25px;

box-shadow:
0 20px 50px
rgba(0,0,0,.35);

color:white;

}

h1{

text-align:center;

font-size:34px;

margin-bottom:25px;

}

label{

font-size:18px;

}

textarea{

width:100%;

height:130px;

margin-top:10px;

padding:14px;

border:none;

border-radius:15px;

font-size:16px;

}

select{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:15px;

font-size:16px;

}

button{

width:100%;

padding:15px;

margin-top:18px;

background:
linear-gradient(
90deg,
#ff416c,
#ff4b2b
);

color:white;

font-size:18px;

border:none;

border-radius:15px;

cursor:pointer;

}

button:hover{

transform:scale(1.04);

transition:.3s;

}

.output{

margin-top:20px;

background:
rgba(255,255,255,.25);

padding:18px;

border-radius:15px;

font-size:20px;

color:white;

}

</style>

</head>

<body>

<div class="container">

<h1>
🌍 Language Translator
</h1>

<form method="POST">

<label>
Enter Text
</label>

<textarea
name="text"
required
placeholder="Type here...">
</textarea>

<select name="source">

<option value="en">
 English
</option>

<option value="te">
 Telugu
</option>

<option value="hi">
 Hindi
</option>

<option value="ta">
 Tamil
</option>

<option value="fr">
 French
</option>

<option value="es">
 Spanish
</option>

<option value="ja">
 Japanese
</option>

</select>

<select name="target">

<option value="te">
 Telugu
</option>

<option value="en">
 English
</option>

<option value="hi">
 Hindi
</option>

<option value="ta">
 Tamil
</option>

<option value="fr">
 French
</option>

<option value="es">
 Spanish
</option>

<option value="ja">
 Japanese
</option>

</select>

<button>

✨ Translate

</button>

</form>

{% if translated %}

<div class="output">

🌟 Result:

<br><br>

{{translated}}

</div>

{% endif %}

</div>

</body>

</html>
